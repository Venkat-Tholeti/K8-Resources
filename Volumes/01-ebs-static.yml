apiVersion: v1
kind: PersistentVolume # It is physical representation of volume
metadata:
    name: ebs-static
spec:
  accessModes:
   - ReadWriteOnce 
  capacity:
    storage: 10Gi
  csi: 
    driver: ebs.csi.aws.com 
    fsType: ext4
    volumeHandle: vol-0ed89814cf4f40a3e

---
apiVersion: v1
kind: PersistentVolumeClaim # It is claiming resource of the PV.So it is called persistent volume claim
metadata:
    name: ebs-static
spec:
  storageClassName: "" # Empty string must be explicitly set otherwise default StorageClass will be set
  volumeName: ebs-static
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi # WE CLAIM WITHIN THE LIMITS OF PV STORAGE

---
apiVersion: v1
kind: Pod
metadata:
  name: nginx
  labels:
    purpose: ebs-static-demo
    project: roboshop
spec:
  nodeSelector:
    topology.kubernetes.io/zone: us-east-1a #kubectl get nodes --show-labels
  containers:
  - name: nginx
    image: nginx
    volumeMounts: # docker run -v host-path:container-path
    - name: persistent-storage
      mountPath: /usr/share/nginx/html
  volumes:
  - name: persistent-storage
    persistentVolumeClaim:
      claimName: ebs-static



  #ReadWriteOnce
#The volume can be mounted as read-write by a single node. ReadWriteOnce access mode still can allow multiple pods to access (read from or write to) that volume when the pods are running on the same node. For single pod access, please see ReadWriteOncePod.
#ReadOnlyMany
#The volume can be mounted as read-only by many nodes.
#ReadWriteMany
#The volume can be mounted as read-write by many nodes.
#ReadWriteOncePod
#The volume can be mounted as read-write by a single Pod. Use ReadWriteOncePod access mode if you want to ensure that only one pod across the whole cluster can read that PVC or write to it.

# Reclaim Policy
# Current reclaim policies are:
# Retain -- manual reclamation
# Recycle -- basic scrub (rm -rf /thevolume/*)
# Delete -- delete the volume