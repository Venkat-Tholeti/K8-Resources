apiVersion: v1
kind: Pod
metadata:
  name: resources
spec:
  containers:
  - name: nginx
    image: nginx
    resources:
      requests: #SOFT LIMIT
        memory: "65Mi"
        cpu: "100m"
      limits: # HARD LIMIT #THIS IS UPPER LIMIT AND RESOURCE CANNOT  USE MORE THAN THIS
        memory: "128Mi"
        cpu: "150m" 