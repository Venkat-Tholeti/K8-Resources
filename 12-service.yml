apiVersion: v1
kind: Service
metadata:
  name: nginx
  labels:
    purpose: service-demo
spec:
  selector: #HERE SELECTORS ARE LABELS (LABELS ARE SELECTORS,HERE THIS SERVICE WILL DEPEND ON LABLES TO SELECT AND WORK ON WHICH PODS)
    purpose: service-demo
    project: roboshop
    environment: dev
  ports:
    - protocol: TCP
      port: 80 # service port
      targetPort: 80 # container port
---
apiVersion: v1
kind: Pod
metadata:
  name: nginx
  labels: #HERE WHICH POD LABELS ARE GIVEN WE NEED TO USE SAME LABELS AS SELECTORS IN ABOVE INSTRUCTIONS
    purpose: service-demo
    project: roboshop
    environment: dev
spec:
  containers:
  - name: nginx
    image: nginx

    #WE NEED TO USE BELOW COMMANDS AFTER THIS CREATION
    #kubectl get pods
    #kubectl get services
    #kubetcl describe svc nginx #HERE SVC IS SERVICE. 
    #kubectl get pods -o wide

    #WE WILL HAVE 3 TYPE OF SERVICES
    #1. CLUSTER IP --- IT IS ONLY INTERAL SERVICE< WHICH MEANS WITH IN THE CLUSTER
    #2. NODEPORT  --- TO EXPOSE APPLICATION/POD TO EXTERNAL WORLD (FOR BROWSING THROUGH WEB, MOBILE, ETC)
    #3. LOAD BALANCER --- TO CREATE EXTERNAL LB
    #BY DEFAULT IF WE DONT SPECIFY TYPE CLUSTER IP WILL GET CREATED