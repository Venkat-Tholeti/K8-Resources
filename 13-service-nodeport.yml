apiVersion: v1
kind: Service
metadata:
  name: nginx-np
  labels:
    purpose: service-np-demo
spec:
 type: NodePort
 selector: #HERE SELECTORS ARE LABELS (LABELS ARE SELECTORS,HERE THIS SERVICE WILL DEPEND ON LABLES TO SELECT AND WORK ON WHICH PODS)
    purpose: service-np-demo
    project: roboshop
    environment: dev
 ports:
    - protocol: TCP
      port: 80 # service port
      targetPort: 80 # container port
  
---
apiVersion: v1
kind: Pod
metadata:
  name: nginx-np
  labels: #HERE WHICH POD LABELS ARE GIVEN WE NEED TO USE SAME LABELS AS SELECTORS IN ABOVE INSTRUCTIONS
    purpose: service-np-demo
    project: roboshop
    environment: dev
spec:
  containers:
  - name: nginx
    image: nginx
